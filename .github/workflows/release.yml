name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build universal DMG
        run: bash scripts/build_dmg.sh "${{ steps.version.outputs.version }}" universal

      - name: Build x86_64 DMG
        run: bash scripts/build_dmg.sh "${{ steps.version.outputs.version }}" x86_64

      - name: Build arm64 DMG
        run: bash scripts/build_dmg.sh "${{ steps.version.outputs.version }}" arm64

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 读取 release notes
          NOTES_FILE="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "${NOTES_FILE}" ]]; then
            BODY="$(cat "${NOTES_FILE}")"
          else
            BODY=""
          fi

          # 删除可能存在的旧 release（静默处理不存在的情况）
          gh release delete "${GITHUB_REF_NAME}" --yes 2>/dev/null || true

          # 创建新 release 并上传 DMG
          gh release create "${GITHUB_REF_NAME}" \
            build/IMELocker-*.dmg \
            --title "${GITHUB_REF_NAME}" \
            --notes "${BODY}"
