name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build universal DMG
        run: bash scripts/build_dmg.sh "${{ steps.version.outputs.version }}" universal

      - name: Build x86_64 DMG
        run: bash scripts/build_dmg.sh "${{ steps.version.outputs.version }}" x86_64

      - name: Build arm64 DMG
        run: bash scripts/build_dmg.sh "${{ steps.version.outputs.version }}" arm64

      - name: Read release notes
        id: notes
        run: |
          NOTES_FILE="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "${NOTES_FILE}" ]]; then
            # 用 EOF 保留多行内容
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            cat "${NOTES_FILE}" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "body=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: build/IMELocker-*.dmg
          generate_release_notes: true
