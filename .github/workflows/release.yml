name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: bash build.sh

      - name: Build DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/build_dmg.sh "$VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/IMELocker-${GITHUB_REF_NAME}.dmg
          generate_release_notes: true
